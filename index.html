<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental Transaction Processing User Interface</title>
  <style>
    :root {
      --primary: #4f7db8; /* blue from logo */
      --accent: #e3c7ad;  /* beige from logo */
      --dark: #0f172a;
      --light: #f4f6f8;
    }

    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      background: var(--light);
      color: #222;
    }

    header {
      background: var(--dark);
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    header img {
      width: 60px;
      height: 60px;
    }

    header h1 {
      margin: 0;
      font-size: 26px;
    }

    header p {
      margin: 4px 0 0;
      font-size: 14px;
      color: #cbd5e1;
    }

    main {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 22px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin-top: 0;
      color: var(--primary);
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      margin-top: 20px;
      padding: 12px 18px;
      border: none;
      border-radius: 6px;
      background: var(--primary);
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #3b5f91;
    }

    .success {
      background: #e8f5e9;
      border-left: 5px solid green;
      padding: 10px;
      margin-top: 10px;
      display: none;
    }

    .error {
      background: #fdecea;
      border-left: 5px solid red;
      padding: 10px;
      margin-top: 10px;
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    th {
      background: var(--primary);
      color: white;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
   <img src="./logo.png" alt="Bike Logo" />
    <div>
      <h1>Rental Transaction Processing User Interface</h1>
      <p>Pathway Biking System</p>
    </div>
  </header>

  <main>
    <div class="grid">
      <section class="card">
        <h2>Checkout Bike</h2>
        <form id="checkoutForm">
          <label>Member ID</label>
          <select id="memberId"></select>

          <label>Bike ID</label>
          <select id="bikeId"></select>

          <label>Rental Location</label>
          <select id="rentalLocation"></select>

          <label>Rental Date</label>
          <input type="date" id="rentalDate" />

          <label>Expected Return Date</label>
          <input type="date" id="expectedReturnDate" />

          <button type="submit">Submit Rental</button>
        </form>
        <div id="checkoutSuccess" class="success"></div>
        <div id="checkoutError" class="error"></div>
      </section>

      <section class="card">
        <h2>Return Bike</h2>
        <form id="returnForm">
          <label>Rental ID</label>
          <select id="returnRentalId"></select>

          <label>Return Location</label>
          <select id="returnLocation"></select>

          <label>Actual Return Date</label>
          <input type="date" id="actualReturnDate" />

          <button type="submit">Process Return</button>
        </form>
        <div id="returnSuccess" class="success"></div>
        <div id="returnError" class="error"></div>
      </section>
    </div>
  </main>

  <script>
    const members = [
      { id: 1001, name: "John Carter", balance: 0 },
      { id: 1002, name: "Mary Lopez", balance: 50 },
      { id: 1005, name: "James Brown", balance: 450 }
    ];

    const bikes = [
      { id: 2001, category: "Road Bike", fee: 80, status: "Available" },
      { id: 2002, category: "Mountain Bike", fee: 95, status: "Available" }
    ];

    const rentals = [];

    const memberSelect = document.getElementById("memberId");
    const bikeSelect = document.getElementById("bikeId");

    memberSelect.innerHTML = members.map(m => `<option value="${m.id}">${m.id} - ${m.name}</option>`);
    bikeSelect.innerHTML = bikes.map(b => `<option value="${b.id}">${b.id} - ${b.category}</option>`);
  </script>
</body>
</html>
